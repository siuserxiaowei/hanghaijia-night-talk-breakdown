<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>航海家夜话：道法术器势拆解</title>
    <meta
      name="description"
      content="9 场航海家夜话内容，按道、法、术、器、势拆解，并梳理每位嘉宾讲了什么。"
    />
    <meta property="og:title" content="航海家夜话：道法术器势拆解" />
    <meta
      property="og:description"
      content="富贵、焦波、AI 产品黄叔、张潇雨、孟虎、zero、老华、刘小排、钱塘江鲤 9 场内容拆解。"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f3ee;
        --paper: #fffdf8;
        --ink: #1d1a16;
        --muted: #6c6258;
        --line: #e2d8cc;
        --accent: #9a4d2f;
        --accent-dark: #5f2c1b;
        --soft: #efe6db;
        --shadow: 0 22px 60px rgba(69, 48, 31, 0.13);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 12% 8%, rgba(154, 77, 47, 0.16), transparent 26rem),
          linear-gradient(180deg, #fbf7ef 0%, var(--bg) 42%, #efe8dc 100%);
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        line-height: 1.72;
      }

      a {
        color: var(--accent-dark);
      }

      .shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 40px 20px 64px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 280px;
        gap: 28px;
        align-items: end;
        padding: 42px;
        border: 1px solid rgba(95, 44, 27, 0.18);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 253, 248, 0.96), rgba(239, 230, 219, 0.86)),
          var(--paper);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        margin: 0 0 14px;
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        max-width: 780px;
        font-size: clamp(34px, 6vw, 64px);
        line-height: 1.04;
        letter-spacing: 0;
      }

      .hero p {
        margin: 18px 0 0;
        max-width: 720px;
        color: var(--muted);
        font-size: 18px;
      }

      .stats {
        display: grid;
        gap: 12px;
      }

      .stat {
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.76);
      }

      .stat strong {
        display: block;
        font-size: 28px;
        line-height: 1;
      }

      .stat span {
        color: var(--muted);
        font-size: 13px;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        margin: 22px 0;
        padding: 12px;
        border: 1px solid rgba(95, 44, 27, 0.16);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.92);
        backdrop-filter: blur(14px);
      }

      .toolbar a,
      .toolbar button {
        min-height: 40px;
        padding: 8px 13px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--paper);
        color: var(--accent-dark);
        font: inherit;
        font-size: 14px;
        text-decoration: none;
        cursor: pointer;
      }

      .toolbar button.active {
        border-color: rgba(154, 77, 47, 0.45);
        background: var(--accent-dark);
        color: #fffaf0;
      }

      .article {
        display: grid;
        grid-template-columns: 238px minmax(0, 1fr);
        gap: 28px;
      }

      .toc {
        position: sticky;
        top: 96px;
        align-self: start;
        max-height: calc(100vh - 120px);
        overflow: auto;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 253, 248, 0.82);
      }

      .toc a {
        display: block;
        padding: 8px 0;
        color: var(--muted);
        font-size: 14px;
        text-decoration: none;
      }

      .toc a:hover {
        color: var(--accent-dark);
      }

      main {
        min-width: 0;
        padding: 30px 38px;
        border: 1px solid rgba(95, 44, 27, 0.16);
        border-radius: 8px;
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      main h1,
      main h2,
      main h3 {
        letter-spacing: 0;
      }

      main h1 {
        display: none;
      }

      main h2 {
        margin: 38px 0 14px;
        padding-top: 10px;
        border-top: 1px solid var(--line);
        color: #2a211b;
        font-size: 28px;
        line-height: 1.24;
      }

      main h2:first-of-type {
        margin-top: 0;
        border-top: 0;
      }

      main h3 {
        margin: 24px 0 10px;
        color: var(--accent-dark);
        font-size: 19px;
      }

      main p {
        margin: 0 0 14px;
      }

      main ul {
        padding-left: 1.2em;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 18px 0 26px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        font-size: 14px;
      }

      th,
      td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        background: var(--soft);
        color: #36271f;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      code {
        border-radius: 5px;
        background: #efe6db;
        padding: 2px 5px;
      }

      .loading {
        color: var(--muted);
      }

      @media (max-width: 860px) {
        .hero {
          grid-template-columns: 1fr;
          padding: 28px;
        }

        .article {
          grid-template-columns: 1fr;
        }

        .toc {
          position: static;
          max-height: none;
        }

        main {
          padding: 22px 18px;
        }

        .toolbar {
          position: static;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">AI 航海家夜话内容资产</p>
          <h1>航海家夜话：道法术器势拆解</h1>
          <p>
            9 场飞书夜话内容，按「道、法、术、器、势」拆成可扫描、可复用、可继续加工的学习档案。
          </p>
        </div>
        <div class="stats" aria-label="内容概览">
          <div class="stat"><strong>9</strong><span>位嘉宾 / 9 份内容</span></div>
          <div class="stat"><strong>5</strong><span>道、法、术、器、势</span></div>
          <div class="stat"><strong>1</strong><span>横向主线总结</span></div>
        </div>
      </header>

      <div class="toolbar">
        <div>
          <button class="active" type="button" data-filter="all">全部</button>
          <button type="button" data-filter="道">道</button>
          <button type="button" data-filter="法">法</button>
          <button type="button" data-filter="术">术</button>
          <button type="button" data-filter="器">器</button>
          <button type="button" data-filter="势">势</button>
        </div>
        <a href="report.md">查看 Markdown 原文</a>
      </div>

      <div class="article">
        <nav class="toc" id="toc" aria-label="目录"></nav>
        <main id="content">
          <p class="loading">正在加载拆解内容...</p>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const content = document.querySelector("#content");
      const toc = document.querySelector("#toc");
      const buttons = document.querySelectorAll("[data-filter]");

      function slugify(text) {
        return text
          .trim()
          .replace(/[^\u4e00-\u9fa5a-zA-Z0-9]+/g, "-")
          .replace(/^-|-$/g, "")
          .slice(0, 80);
      }

      function buildToc() {
        toc.innerHTML = "";
        content.querySelectorAll("h2").forEach((heading) => {
          const id = slugify(heading.textContent);
          heading.id = id;
          const link = document.createElement("a");
          link.href = `#${id}`;
          link.textContent = heading.textContent;
          toc.appendChild(link);
        });
      }

      function applyFilter(filter) {
        const blocks = [...content.children];
        let active = filter === "all";
        for (const block of blocks) {
          if (block.tagName === "H2") active = filter === "all";
          if (block.tagName === "H3") active = filter === "all" || block.textContent.trim() === filter;
          block.hidden = !active;
        }
      }

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          buttons.forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          applyFilter(button.dataset.filter);
        });
      });

      fetch("report.md")
        .then((response) => {
          if (!response.ok) throw new Error("report.md 加载失败");
          return response.text();
        })
        .then((markdown) => {
          content.innerHTML = marked.parse(markdown);
          buildToc();
        })
        .catch((error) => {
          content.innerHTML = `<p>${error.message}</p>`;
        });
    </script>
  </body>
</html>
